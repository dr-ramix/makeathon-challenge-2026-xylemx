model: resnet18_unet
batch_size: 4
patch_size: 128
train_stride: 128
eval_stride: 128
epochs: 40
lr: 0.0003
weight_decay: 0.0001
dropout: 0.1
num_workers: 4
mixed_precision: true
loss: bce_dice
bce_weight: 0.7
dice_weight: 0.3
positive_patch_sampling: true
positive_patch_ratio: 0.5
label_fusion: consensus_2of3
clip_features: true
normalization: zscore
min_valid_pixels_fraction_per_month: 0.2
min_valid_patch_fraction: 0.05
year_weight_2020: 0.9
year_weight_2021: 0.94
year_weight_2022: 0.98
year_weight_2023: 1.02
year_weight_2024: 1.06
year_weight_2025: 1.1
horizontal_flip: true
horizontal_flip_p: 0.5
vertical_flip: true
vertical_flip_p: 0.5
rotate90: true
rotate90_p: 0.75
cutmix: false
mixup: false
seed: 42
data_root: data/makeathon-challenge
output_root: output/training_runs
